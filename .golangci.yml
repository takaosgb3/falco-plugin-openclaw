run:
  timeout: 5m
  go: '1.22'

linters:
  enable:
    - gosec
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - prealloc

linters-settings:
  gosec:
    excludes:
      - G304  # File path provided as taint input (expected for log file paths)

  gocritic:
    enabled-checks:
      - appendAssign
      - argOrder
      - badCall
      - badCond
      - captLocal
      - caseOrder
      - defaultCaseOrder
      - dupArg
      - dupBranchBody
      - dupCase
      - dupSubExpr
      - elseif
      - exitAfterDefer
      - flagDeref
      - flagName
      - mapKey
      - nilValReturn
      - offBy1
      - sloppyLen
      - underef
      - unlambda
      - unslice

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
