# Falco configuration for openclaw plugin (Docker)
# P008: load_plugins is REQUIRED
# P009: rate: 0 and max_burst: 0 to prevent alert suppression

plugins:
  - name: openclaw
    library_path: /usr/share/falco/plugins/libopenclaw-plugin.so
    init_config: |
      {
        "log_paths": [
          "/openclaw-logs/sessions/",
          "/openclaw-logs/logs/config-audit.jsonl",
          "/openclaw-logs/logs/gateway.log"
        ],
        "event_buffer_size": 1000
      }

load_plugins: [openclaw]

rules_files:
  - /etc/falco/rules.d/openclaw_rules.yaml

stdout_output:
  enabled: true

json_output: true

# P009: No rate limiting
outputs:
  rate: 0
  max_burst: 0
