# Local Falco configuration for openclaw plugin (macOS)
# Requires: Falco 0.43.0+ built with MINIMAL_BUILD=ON
# Run with: falco -c falco-local.yaml --disable-source syscall -U
plugins:
  - name: openclaw
    library_path: ./libopenclaw-plugin-darwin-arm64.dylib
    init_config: |
      {"log_paths": ["~/.openclaw/agents/main/sessions/", "~/.openclaw/logs/config-audit.jsonl", "~/.openclaw/logs/gateway.log"]}

load_plugins: [openclaw]

rules_files:
  - ./rules/openclaw_rules.yaml

stdout_output:
  enabled: true

json_output: true
