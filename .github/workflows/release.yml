name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.2.0)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must match format v*.*.* (e.g., v0.2.0)"
            exit 1
          fi
          echo "Version ${{ inputs.version }} is valid"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            binary: libopenclaw-plugin-linux-amd64.so
          - os: macos-14
            binary: libopenclaw-plugin-darwin-arm64.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Tests
        run: go test ./... -v -race

      - name: Build Release Binary
        run: make build-release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/libopenclaw-plugin-linux-amd64.so/libopenclaw-plugin-linux-amd64.so release-assets/
          cp artifacts/libopenclaw-plugin-darwin-arm64.dylib/libopenclaw-plugin-darwin-arm64.dylib release-assets/
          cp rules/openclaw_rules.yaml release-assets/

          cd release-assets
          sha256sum * > checksums.sha256
          echo "Checksums:"
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            release-assets/libopenclaw-plugin-linux-amd64.so
            release-assets/libopenclaw-plugin-darwin-arm64.dylib
            release-assets/openclaw_rules.yaml
            release-assets/checksums.sha256
