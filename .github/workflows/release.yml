name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must match format v*.*.* (e.g., v0.1.0)"
            exit 1
          fi
          echo "Version ${{ inputs.version }} is valid"

  release:
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Tests
        run: go test ./... -v -race

      - name: Build Release Binary
        run: make build-release

      - name: Verify Binary
        run: make verify

      - name: Generate Checksums
        run: |
          sha256sum libopenclaw-plugin-linux-amd64.so > checksums.sha256
          sha256sum rules/openclaw_rules.yaml >> checksums.sha256
          echo "Checksums:"
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            libopenclaw-plugin-linux-amd64.so
            rules/openclaw_rules.yaml
            checksums.sha256
