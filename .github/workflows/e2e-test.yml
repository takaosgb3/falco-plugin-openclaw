name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'rules/**'
      - 'test/**'
      - 'e2e/**'
      - '.github/workflows/e2e-test.yml'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'rules/**'
      - 'test/**'
      - 'e2e/**'
      - '.github/workflows/e2e-test.yml'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  go-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Level 1 - Pattern Tests
        run: go test ./test/e2e/ -v -race -run TestPattern
      - name: Level 2 - Pipeline Tests
        run: go test ./cmd/plugin-sdk/ -v -race -run TestPipeline
      - name: Comment on PR (failure)
        if: failure() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-test-results
          message: |
            ## E2E Test Results - FAILED
            Level 1/2 Go tests failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

  falco-integration:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [go-tests]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Falco
        env:
          FALCO_VERSION: '0.43.0'
        run: |
          curl -fsSL https://falco.org/repo/falcosecurity-packages.asc | sudo gpg --dearmor -o /usr/share/keyrings/falco-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/falco-archive-keyring.gpg] https://download.falco.org/packages/deb stable main" | sudo tee /etc/apt/sources.list.d/falcosecurity.list
          sudo apt-get update
          # Pin to tested version; fallback to latest if pinned version unavailable
          sudo FALCO_FRONTEND=noninteractive apt-get install -y "falco=${FALCO_VERSION}" \
            || sudo FALCO_FRONTEND=noninteractive apt-get install -y falco
          falco --version
      - name: Build Plugin
        run: make build
      - name: Run E2E Integration Tests
        run: make e2e-ci
      - name: Validate Falco rules
        run: |
          sudo falco --validate rules/openclaw_rules.yaml -c falco.yaml 2>&1 || true
      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/results/
          retention-days: 30

  allure-report:
    runs-on: ubuntu-24.04
    needs: [falco-integration]
    if: always() && needs.falco-integration.result != 'skipped'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Allure CLI
        run: |
          curl -o allure-2.32.0.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -xzf allure-2.32.0.tgz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download E2E results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: e2e-results
          path: e2e/results/
      - name: Install Python dependencies
        run: pip install -r e2e/allure/requirements.txt
      - name: Generate Allure results
        run: make e2e-report
      - name: Fetch previous Allure history
        run: |
          # Determine the latest report number from gh-pages
          git fetch origin gh-pages --depth=1 2>/dev/null || { echo "No gh-pages branch yet, skipping history"; exit 0; }

          # Find the latest run number directory
          LATEST=$(git ls-tree --name-only origin/gh-pages -- e2e-report/ 2>/dev/null \
            | grep -E '^[0-9]+$' | sort -n | tail -1) || true

          if [ -z "$LATEST" ]; then
            echo "No previous report found, skipping history"
            exit 0
          fi

          echo "Fetching history from e2e-report/${LATEST}"
          mkdir -p allure-results/history

          for f in categories-trend.json duration-trend.json history-trend.json history.json retry-trend.json; do
            git show "origin/gh-pages:e2e-report/${LATEST}/history/${f}" \
              > "allure-results/history/${f}" 2>/dev/null || true
          done

          echo "History files retrieved:"
          ls -la allure-results/history/ || true
      - name: Inject Allure metadata
        run: |
          cat > allure-results/environment.properties <<PROPS
          Plugin=falco-plugin-openclaw
          Runner=GitHub Actions
          Run.Number=${{ github.run_number }}
          Run.ID=${{ github.run_id }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          PROPS

          cat > allure-results/executor.json <<JSON
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "E2E Tests #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://takaosgb3.github.io/falco-plugin-openclaw/e2e-report/${{ github.run_number }}/",
            "buildOrder": ${{ github.run_number }}
          }
          JSON
      - name: Generate Allure HTML report
        run: allure generate allure-results -o allure-report --clean
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  deploy-pages:
    runs-on: ubuntu-24.04
    needs: [allure-report]
    if: github.ref == 'refs/heads/main' && always() && needs.allure-report.result == 'success'
    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      # Stage 1: Deploy numbered report (immutable archive)
      - name: Deploy numbered report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: e2e-report/${{ github.run_number }}
          keep_files: true

      # Stage 2: Deploy latest redirect
      - name: Create latest redirect
        run: |
          mkdir -p latest-redirect
          cat > latest-redirect/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=../PLACEHOLDER/">
            <link rel="canonical" href="../PLACEHOLDER/">
            <title>Redirecting to latest report...</title>
          </head>
          <body>
            <p>Redirecting to <a href="../PLACEHOLDER/">latest report (#PLACEHOLDER)</a>...</p>
          </body>
          </html>
          HTML
          sed -i "s/PLACEHOLDER/${{ github.run_number }}/g" latest-redirect/index.html
      - name: Deploy latest redirect
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./latest-redirect
          destination_dir: e2e-report/latest
          keep_files: false

      # Stage 3: Deploy root redirect (landing page)
      - name: Create root redirect
        run: |
          mkdir -p root-redirect
          cat > root-redirect/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=e2e-report/PLACEHOLDER/">
            <link rel="canonical" href="e2e-report/PLACEHOLDER/">
            <title>Falco Plugin OpenClaw - E2E Reports</title>
          </head>
          <body>
            <p>Redirecting to <a href="e2e-report/PLACEHOLDER/">latest E2E report (#PLACEHOLDER)</a>...</p>
          </body>
          </html>
          HTML
          sed -i "s/PLACEHOLDER/${{ github.run_number }}/g" root-redirect/index.html
      - name: Deploy root redirect
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./root-redirect
          destination_dir: .
          keep_files: true

      # Deploy summary
      - name: Deploy summary
        run: |
          RUN_NUM="${{ github.run_number }}"
          BASE_URL="https://takaosgb3.github.io/falco-plugin-openclaw"
          cat >> "$GITHUB_STEP_SUMMARY" <<TABLE
          ## Allure Report Deployed

          | URL | Description |
          |-----|-------------|
          | [Report #${RUN_NUM}](${BASE_URL}/e2e-report/${RUN_NUM}/) | This run's report (immutable) |
          | [Latest](${BASE_URL}/e2e-report/latest/) | Always points to newest report |
          | [Root](${BASE_URL}/) | Landing page redirect |
          TABLE
