name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Option 1: Self-hosted runner (for existing development environments)
    # runs-on: [self-hosted, linux, x64, local]
    # Option 2: GitHub-hosted runner (for new repositories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Tests
        run: go test ./... -v

      - name: Run Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run Lint
        run: golangci-lint run

  build:
    needs: test
    # Option 1: Self-hosted runner
    # runs-on: [self-hosted, linux, x64, local]
    # Option 2: GitHub-hosted runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Plugin
        run: make build

      - name: Verify Binary
        run: make verify

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-binary
          path: lib*-plugin-linux-amd64.so

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    # Option 1: Self-hosted runner
    # runs-on: [self-hosted, linux, x64, local]
    # Option 2: GitHub-hosted runner
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Release Binary
        run: make package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lib*-plugin-linux-amd64.so
            rules/*_rules.yaml
            checksums.sha256
